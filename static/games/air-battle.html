<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>决战海空</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#040c1c;
  display:flex; flex-direction:column; align-items:center;
  padding:10px 0;
  font-family:'Microsoft YaHei',monospace;
  user-select:none;
}
#ttl {
  font-size:1.25rem; font-weight:bold; letter-spacing:8px;
  color:#ffd700; margin-bottom:8px;
  text-shadow:0 0 14px #ff6600, 0 0 28px #ff2200;
}
canvas { display:block; border-radius:8px; box-shadow:0 0 30px rgba(0,100,255,0.2); }
#hint { margin-top:8px; font-size:0.65rem; color:#2a3a4a; }
</style>
</head>
<body>
<div id="ttl">决战海空</div>
<canvas id="c" width="400" height="580"></canvas>
<div id="hint">方向键 / WASD 移动 &nbsp;·&nbsp; 自动开火 &nbsp;·&nbsp; 空格 炸弹</div>
<script>
const CV = document.getElementById('c');
const cx = CV.getContext('2d');
const W = CV.width, H = CV.height;

// ── 输入 ─────────────────────────────────────────────────────
const K = {};
window.addEventListener('keydown', e => {
  K[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { K[e.code] = false; });

// ── 工具 ─────────────────────────────────────────────────────
const rn  = (a,b) => a + Math.random()*(b-a);
const pk  = a  => a[Math.floor(Math.random()*a.length)];
const dst = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const cl  = (v,a,b) => Math.max(a,Math.min(b,v));

// ── 全局状态 ─────────────────────────────────────────────────
let phase, score, hi, wave, combo, comboT;
let pl, buls, eBuls, foes, pts, pups;
let bgY=0, frame=0;
let spawnQ=[], spawnIdx=0, betweenTimer=0, betweenPhase=false;
let msg=null;
hi = +localStorage.getItem('ab_hi')||0;

// ── 背景 ─────────────────────────────────────────────────────
function drawBg() {
  const g = cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#03091a'); g.addColorStop(0.5,'#05102a'); g.addColorStop(1,'#040d22');
  cx.fillStyle=g; cx.fillRect(0,0,W,H);

  // 水面波纹
  const sy = bgY % 50;
  for (let y=sy-50; y<H; y+=50) {
    cx.strokeStyle='rgba(40,90,180,0.12)'; cx.lineWidth=1;
    cx.beginPath(); cx.moveTo(0,y); cx.lineTo(W,y); cx.stroke();
  }
  for (let y=sy-25; y<H; y+=50) {
    cx.strokeStyle='rgba(20,60,140,0.07)'; cx.lineWidth=1;
    cx.beginPath(); cx.moveTo(0,y); cx.lineTo(W,y); cx.stroke();
  }
  // 星光
  const seed = Math.floor(bgY/3);
  for (let i=0;i<24;i++) {
    const sx = ((seed*37+i*91)%399)+0.5;
    const sy2 = ((seed*13+i*173)%H)+0.5;
    const br = 0.3+((seed*7+i*31)%10)/20;
    cx.fillStyle=`rgba(200,220,255,${br})`;
    cx.fillRect(sx,sy2,1,1);
  }
  bgY += 1.2;
}

// ── 玩家 ─────────────────────────────────────────────────────
function mkPl() {
  return {
    x:W/2, y:H-90, r:16, spd:5.5,
    hp:3, maxHp:3,
    shotT:0, shotRate:9,
    invT:0, bombCD:0, bombs:2,
    spreadT:0, rapidT:0, shieldT:0,
  };
}

function drawPl() {
  if (pl.invT>0 && Math.floor(pl.invT/4)%2===0) return;
  cx.save(); cx.translate(pl.x, pl.y);

  if (pl.shieldT>0) {
    cx.save();
    cx.globalAlpha = 0.3+0.2*Math.sin(Date.now()/80);
    cx.strokeStyle='#00eeff'; cx.lineWidth=2.5;
    cx.beginPath(); cx.arc(0,0,pl.r+10,0,Math.PI*2); cx.stroke();
    cx.restore();
  }

  // 引擎火焰
  const fl = 7+Math.random()*9;
  cx.fillStyle='#ff6600';
  cx.beginPath(); cx.ellipse(-5,15,2.5,fl/2,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(5,15,2.5,fl/2,0,0,Math.PI*2); cx.fill();
  cx.fillStyle='#ffdd00';
  cx.beginPath(); cx.ellipse(-5,17,1.5,fl/3,0,0,Math.PI*2); cx.fill();
  cx.beginPath(); cx.ellipse(5,17,1.5,fl/3,0,0,Math.PI*2); cx.fill();

  // 机翼
  cx.fillStyle='#1a3a9a';
  cx.beginPath(); cx.moveTo(-8,4); cx.lineTo(-30,20); cx.lineTo(-22,22); cx.lineTo(-5,9); cx.closePath(); cx.fill();
  cx.beginPath(); cx.moveTo(8,4);  cx.lineTo(30,20);  cx.lineTo(22,22);  cx.lineTo(5,9);  cx.closePath(); cx.fill();

  // 机身
  cx.fillStyle='#1e50dd';
  cx.beginPath();
  cx.moveTo(0,-24); cx.lineTo(-9,4); cx.lineTo(-5,10); cx.lineTo(0,16); cx.lineTo(5,10); cx.lineTo(9,4);
  cx.closePath(); cx.fill();
  cx.fillStyle='#3d6fff';
  cx.beginPath();
  cx.moveTo(0,-24); cx.lineTo(-4,2); cx.lineTo(0,16); cx.lineTo(4,2);
  cx.closePath(); cx.fill();

  // 驾驶舱
  cx.fillStyle='#aadeff';
  cx.beginPath(); cx.ellipse(0,-9,4,8,0,0,Math.PI*2); cx.fill();

  // 机炮
  cx.fillStyle='#778899';
  cx.fillRect(-9,-22,2.5,8); cx.fillRect(6,-22,2.5,8);
  if (pl.spreadT>0) {
    cx.fillRect(-15,-18,2,7); cx.fillRect(13,-18,2,7);
  }
  cx.restore();
}

// ── 敌机 ─────────────────────────────────────────────────────
function mkFoe(type, x, y) {
  const b={x, y, vx:0, vy:0, shotT:0, dead:false, type, phT:0};
  if (type===1) return {...b, hp:1,maxHp:1, r:13, vy:rn(1.6,2.6), shotRate:rn(90,150), pts:100, col:'#cc2200'};
  if (type===2) return {...b, hp:3,maxHp:3, r:18, vy:rn(1,1.8),   shotRate:rn(65,100), pts:250, col:'#bb5500'};
  if (type===3) return {...b, hp:7,maxHp:7, r:26, vy:rn(0.6,1),   shotRate:rn(80,110), pts:600, col:'#882299'};
  // boss
  return {...b, hp:150,maxHp:150, r:52, vy:0.5, shotRate:50, shotT2:0, pts:4000, col:'#cc7700', entered:false};
}

function drawFoe(e) {
  cx.save(); cx.translate(e.x, e.y);

  if (e.type===1) {
    // 侦察机 — 红色
    cx.fillStyle='#cc2200';
    cx.beginPath(); cx.moveTo(0,20); cx.lineTo(-11,2); cx.lineTo(-8,-14); cx.lineTo(0,-20); cx.lineTo(8,-14); cx.lineTo(11,2); cx.closePath(); cx.fill();
    cx.fillStyle='#ff4422';
    cx.beginPath(); cx.moveTo(0,20); cx.lineTo(-3,2); cx.lineTo(0,-20); cx.lineTo(3,2); cx.closePath(); cx.fill();
    cx.fillStyle='#ffaaaa'; cx.beginPath(); cx.ellipse(0,2,4,7,0,0,Math.PI*2); cx.fill();
    cx.fillStyle='#884'; cx.fillRect(-13,2,4,5); cx.fillRect(9,2,4,5);

  } else if (e.type===2) {
    // 截击机 — 橙色
    cx.fillStyle='#cc5500';
    cx.beginPath(); cx.moveTo(0,26); cx.lineTo(-14,8); cx.lineTo(-12,-12); cx.lineTo(0,-24); cx.lineTo(12,-12); cx.lineTo(14,8); cx.closePath(); cx.fill();
    cx.fillStyle='#994400';
    cx.beginPath(); cx.moveTo(-14,8); cx.lineTo(-34,20); cx.lineTo(-26,24); cx.lineTo(-10,12); cx.closePath(); cx.fill();
    cx.beginPath(); cx.moveTo(14,8);  cx.lineTo(34,20);  cx.lineTo(26,24);  cx.lineTo(10,12);  cx.closePath(); cx.fill();
    cx.fillStyle='#ff8833';
    cx.beginPath(); cx.moveTo(0,26); cx.lineTo(-5,8); cx.lineTo(0,-24); cx.lineTo(5,8); cx.closePath(); cx.fill();
    cx.fillStyle='#ffccaa'; cx.beginPath(); cx.ellipse(0,-4,5,9,0,0,Math.PI*2); cx.fill();

  } else if (e.type===3) {
    // 轰炸机 — 紫色
    cx.fillStyle='#661188';
    cx.beginPath(); cx.moveTo(0,32); cx.lineTo(-20,10); cx.lineTo(-18,-18); cx.lineTo(0,-28); cx.lineTo(18,-18); cx.lineTo(20,10); cx.closePath(); cx.fill();
    cx.fillStyle='#550077';
    cx.beginPath(); cx.moveTo(-20,10); cx.lineTo(-50,22); cx.lineTo(-42,28); cx.lineTo(-16,16); cx.closePath(); cx.fill();
    cx.beginPath(); cx.moveTo(20,10);  cx.lineTo(50,22);  cx.lineTo(42,28);  cx.lineTo(16,16);  cx.closePath(); cx.fill();
    cx.fillStyle='#aa44cc';
    cx.beginPath(); cx.moveTo(0,32); cx.lineTo(-7,10); cx.lineTo(0,-28); cx.lineTo(7,10); cx.closePath(); cx.fill();
    cx.fillStyle='#dd99ff'; cx.beginPath(); cx.ellipse(0,-6,7,12,0,0,Math.PI*2); cx.fill();
    cx.fillStyle='#553366';
    cx.beginPath(); cx.ellipse(-22,20,7,10,0.3,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse(22,20,7,10,-0.3,0,Math.PI*2); cx.fill();

  } else if (e.type===10) {
    // BOSS — 金色巨舰
    const t=Date.now()/1000;
    cx.save(); cx.globalAlpha=0.12+0.08*Math.sin(t*2);
    cx.fillStyle='#ffaa00'; cx.beginPath(); cx.arc(0,0,e.r+22,0,Math.PI*2); cx.fill();
    cx.restore();

    cx.fillStyle='#7a4a00';
    cx.beginPath();
    cx.moveTo(0,60); cx.lineTo(-42,30); cx.lineTo(-52,-20); cx.lineTo(-32,-56); cx.lineTo(0,-66);
    cx.lineTo(32,-56); cx.lineTo(52,-20); cx.lineTo(42,30); cx.closePath(); cx.fill();
    cx.fillStyle='#cc8800';
    cx.beginPath();
    cx.moveTo(0,60); cx.lineTo(-18,30); cx.lineTo(-22,-20); cx.lineTo(-12,-56); cx.lineTo(0,-66);
    cx.lineTo(12,-56); cx.lineTo(22,-20); cx.lineTo(18,30); cx.closePath(); cx.fill();
    cx.fillStyle='#554200';
    cx.beginPath(); cx.moveTo(-52,-20); cx.lineTo(-92,2); cx.lineTo(-82,22); cx.lineTo(-42,10); cx.closePath(); cx.fill();
    cx.beginPath(); cx.moveTo(52,-20);  cx.lineTo(92,2);  cx.lineTo(82,22);  cx.lineTo(42,10);  cx.closePath(); cx.fill();
    cx.fillStyle='#ff3300'; cx.beginPath(); cx.ellipse(0,-28,13,20,0,0,Math.PI*2); cx.fill();
    cx.fillStyle='#ffcc00'; cx.beginPath(); cx.ellipse(0,-28,6,10,0,0,Math.PI*2); cx.fill();
    cx.fillStyle='#333';
    cx.beginPath(); cx.ellipse(-40,12,8,14,0,0,Math.PI*2); cx.fill();
    cx.beginPath(); cx.ellipse(40,12,8,14,0,0,Math.PI*2); cx.fill();

    // BOSS 血条
    const bw=130, bh=10, ratio=e.hp/e.maxHp;
    cx.fillStyle='#400'; cx.fillRect(-bw/2,74,bw,bh);
    cx.fillStyle=ratio>0.5?'#00ee44':ratio>0.25?'#ffdd00':'#ff2200';
    cx.fillRect(-bw/2,74,bw*ratio,bh);
    cx.strokeStyle='rgba(255,255,255,0.4)'; cx.lineWidth=1; cx.strokeRect(-bw/2,74,bw,bh);
    cx.fillStyle='#fff'; cx.font='8px monospace'; cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText('BOSS',0,79);
  }

  // 非Boss普通敌机血条
  if (e.type>=2 && e.type<10) {
    const bw=e.r*2, ratio=e.hp/e.maxHp;
    cx.fillStyle='#300'; cx.fillRect(-bw/2,e.r+4,bw,4);
    cx.fillStyle='#0f0'; cx.fillRect(-bw/2,e.r+4,bw*ratio,4);
  }
  cx.restore();
}

// ── 子弹 ─────────────────────────────────────────────────────
function drawBuls() {
  for (const b of buls) {
    cx.save();
    cx.fillStyle='#ffff00'; cx.shadowColor='#ffff00'; cx.shadowBlur=8;
    cx.beginPath(); cx.ellipse(b.x,b.y,2.5,7,0,0,Math.PI*2); cx.fill();
    cx.restore();
  }
  for (const b of eBuls) {
    cx.save();
    cx.fillStyle='#ff3300'; cx.shadowColor='#ff1100'; cx.shadowBlur=10;
    cx.beginPath(); cx.arc(b.x,b.y,4.5,0,Math.PI*2); cx.fill();
    cx.fillStyle='#ff9977'; cx.shadowBlur=0;
    cx.beginPath(); cx.arc(b.x,b.y,2,0,Math.PI*2); cx.fill();
    cx.restore();
  }
}

// ── 粒子爆炸 ─────────────────────────────────────────────────
function bang(x,y,n,cols,sr,vr) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, v=rn(vr[0],vr[1]);
    pts.push({x,y, vx:Math.cos(a)*v, vy:Math.sin(a)*v,
      life:rn(18,50), maxLife:50, col:pk(cols), sz:rn(sr[0],sr[1]), dead:false});
  }
}

function drawPts() {
  for (const p of pts) {
    cx.save(); cx.globalAlpha=p.life/p.maxLife;
    cx.fillStyle=p.col; cx.shadowColor=p.col; cx.shadowBlur=4;
    cx.beginPath(); cx.arc(p.x,p.y,p.sz,0,Math.PI*2); cx.fill();
    cx.restore();
  }
}

// ── 道具 ─────────────────────────────────────────────────────
const PUPS={
  spread:{col:'#00ffaa',label:'≋'},
  rapid: {col:'#ffff00',label:'⚡'},
  hp:    {col:'#ff4455',label:'♥'},
  shield:{col:'#44aaff',label:'◈'},
  bomb:  {col:'#ff8800',label:'◉'},
};
function mkPup(x,y) {
  const r=Math.random();
  const type = r<0.1?'hp': r<0.22?'shield': r<0.4?'bomb': r<0.7?'spread': 'rapid';
  return {x,y,vy:1.4,type,dead:false,r:14,t:0};
}
function drawPups() {
  for (const p of pups) {
    const info=PUPS[p.type];
    cx.save(); cx.translate(p.x,p.y);
    cx.rotate(Math.sin(p.t*0.06)*0.18);
    cx.shadowColor=info.col; cx.shadowBlur=14;
    cx.fillStyle=info.col+'33'; cx.strokeStyle=info.col; cx.lineWidth=2;
    cx.beginPath(); cx.arc(0,0,p.r,0,Math.PI*2); cx.fill(); cx.stroke();
    cx.fillStyle='#fff'; cx.font='bold 13px monospace';
    cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText(info.label,0,0);
    cx.restore();
  }
}

// ── 波次构建 ─────────────────────────────────────────────────
function buildWave(w) {
  if (w%5===0) return [{type:10,x:W/2,y:-80,atF:30}];
  const q=[];
  const n=Math.min(5+w*2,22);
  for (let i=0;i<n;i++) {
    const r=Math.random(), rf=Math.random();
    let type;
    if (w<=2)      type=1;
    else if (w<=4) type=rf<0.65?1:2;
    else if (w<=7) type=rf<0.35?1:rf<0.75?2:3;
    else           type=rf<0.2?1:rf<0.55?2:3;
    q.push({type, x:rn(30,W-30), y:rn(-70,-20), atF:i*28+Math.floor(Math.random()*20)});
  }
  return q.sort((a,b)=>a.atF-b.atF);
}

// ── 敌机AI ───────────────────────────────────────────────────
function aimAt(e,spd) {
  const dx=pl.x-e.x, dy=pl.y-e.y, d=Math.hypot(dx,dy)||1;
  return [dx/d*spd, dy/d*spd];
}

function updateFoe(e) {
  if (e.type===1) {
    e.y+=e.vy;
    e.shotT++; if(e.shotT>=e.shotRate){e.shotT=0; const[vx,vy]=aimAt(e,3.8); eBuls.push({x:e.x,y:e.y+e.r,vx,vy,dead:false});}

  } else if (e.type===2) {
    e.phT++; e.vx=Math.sin(e.phT*0.045)*2.8; e.x+=e.vx; e.y+=e.vy;
    e.x=cl(e.x,20,W-20);
    e.shotT++; if(e.shotT>=e.shotRate){e.shotT=0;
      const[vx,vy]=aimAt(e,3.5);
      eBuls.push({x:e.x-9,y:e.y+10,vx:vx-0.4,vy,dead:false});
      eBuls.push({x:e.x+9,y:e.y+10,vx:vx+0.4,vy,dead:false});
    }

  } else if (e.type===3) {
    e.phT++; e.vx=Math.sin(e.phT*0.028)*1.2; e.x+=e.vx; e.y+=e.vy;
    e.x=cl(e.x,30,W-30);
    e.shotT++; if(e.shotT>=e.shotRate){e.shotT=0;
      for(let a=-2;a<=2;a++){
        const ang=Math.PI/2+a*0.26;
        eBuls.push({x:e.x,y:e.y+e.r,vx:Math.cos(ang)*3.8,vy:Math.sin(ang)*3.8,dead:false});
      }
    }

  } else if (e.type===10) {
    if(!e.entered){ e.y+=e.vy; if(e.y>=115){e.entered=true;} return; }
    const t=Date.now()/1000;
    const ph2=e.hp<e.maxHp*0.5;
    e.x=W/2+Math.sin(t*(ph2?1.5:1))*( W/2-70 );
    // 主炮
    e.shotT++; if(e.shotT>=(ph2?30:50)){e.shotT=0;
      const ways=ph2?8:5;
      for(let a=0;a<ways;a++){
        const ang=Math.PI/2+(a-(ways-1)/2)*0.2;
        eBuls.push({x:e.x,y:e.y+60,vx:Math.cos(ang)*4.8,vy:Math.sin(ang)*4.8,dead:false});
      }
      if(ph2){const[vx,vy]=aimAt(e,4.2); eBuls.push({x:e.x-40,y:e.y+10,vx,vy,dead:false}); eBuls.push({x:e.x+40,y:e.y+10,vx,vy,dead:false});}
    }
    // 环形弹幕（2阶段）
    e.shotT2=(e.shotT2||0)+1;
    if(ph2 && e.shotT2>=80){e.shotT2=0;
      for(let a=0;a<16;a++){const ang=(a/16)*Math.PI*2; eBuls.push({x:e.x,y:e.y,vx:Math.cos(ang)*3,vy:Math.sin(ang)*3,dead:false});}
    }
  }
}

// ── 玩家射击 & 炸弹 ─────────────────────────────────────────
function shoot() {
  const rate = pl.rapidT>0 ? Math.max(4,pl.shotRate-6) : pl.shotRate;
  pl.shotT++; if(pl.shotT<rate) return; pl.shotT=0;
  const spd=14, spread=pl.spreadT>0;
  if (!spread) {
    buls.push({x:pl.x,y:pl.y-22,vx:0,vy:-spd,dead:false});
  } else {
    buls.push({x:pl.x-7,y:pl.y-20,vx:0,vy:-spd,dead:false});
    buls.push({x:pl.x+7,y:pl.y-20,vx:0,vy:-spd,dead:false});
    buls.push({x:pl.x,y:pl.y-22,vx:-1.2,vy:-spd,dead:false});
    buls.push({x:pl.x,y:pl.y-22,vx:1.2,vy:-spd,dead:false});
  }
}

function doBomb() {
  if(pl.bombs<=0||pl.bombCD>0) return;
  pl.bombs--; pl.bombCD=70;
  bang(pl.x,pl.y,70,['#fff','#88ffff','#4488ff','#ffff44'],[2,9],[3,18]);
  for(const e of foes) {
    if(e.dead) continue;
    if(dst(e,pl)<280){ e.hp-=35; bang(e.x,e.y,18,['#ff8800','#ffcc00','#ff4400'],[2,5],[2,8]); }
  }
  for(const b of eBuls) b.dead=true;
  score+=80;
}

// ── 碰撞 ─────────────────────────────────────────────────────
function collide() {
  // 玩家子弹击中敌机
  for(const b of buls){
    if(b.dead) continue;
    for(const e of foes){
      if(e.dead) continue;
      if(dst(b,e)<e.r+4){
        b.dead=true; e.hp--;
        bang(b.x,b.y,4,['#ffff88','#ffaa00'],[1,3],[1,4]);
        if(e.hp<=0){
          e.dead=true; score+=e.pts; combo++; comboT=130;
          bang(e.x,e.y,30,['#ff8800','#ffcc00','#ff4400','#ffffff'],[2,7],[2,11]);
          const dr=e.type===10?1:e.type===3?0.55:e.type===2?0.28:0.15;
          if(Math.random()<dr) pups.push(mkPup(e.x,e.y));
          if(e.type===10) { score+=2000; showMsg('🎖 BOSS 击落！',120); }
        }
        break;
      }
    }
  }
  // 敌机子弹 & 敌机碰撞玩家
  if(pl.invT<=0 && pl.shieldT<=0){
    for(const b of eBuls){
      if(b.dead) continue;
      if(dst(b,pl)<pl.r-2){ b.dead=true; hitPl(); return; }
    }
    for(const e of foes){
      if(e.dead) continue;
      if(dst(e,pl)<e.r+pl.r-12){ e.hp-=10; if(e.hp<=0){e.dead=true; bang(e.x,e.y,20,['#ff8800','#ff4400'],[2,6],[2,8]);} hitPl(); return; }
    }
  }
  // 玩家捡取道具
  for(const p of pups){
    if(p.dead) continue;
    if(dst(p,pl)<p.r+pl.r-6){ p.dead=true; applyPup(p.type); }
  }
}

function hitPl(){
  if(pl.invT>0||pl.shieldT>0) return;
  pl.hp--; pl.invT=130; combo=0;
  bang(pl.x,pl.y,16,['#4488ff','#88aaff','#fff'],[2,5],[2,8]);
  if(pl.hp<=0){
    bang(pl.x,pl.y,60,['#ff8800','#ffcc00','#ff4400','#fff'],[3,9],[3,14]);
    phase='over';
    if(score>hi){hi=score; localStorage.setItem('ab_hi',hi);}
  }
}

function applyPup(t){
  if(t==='spread'){pl.spreadT=600; showMsg('≋ 扩散弹！',60);}
  else if(t==='rapid'){pl.rapidT=600; showMsg('⚡ 急速射！',60);}
  else if(t==='hp'){pl.hp=Math.min(pl.hp+1,pl.maxHp); showMsg('♥ HP +1！',60);}
  else if(t==='shield'){pl.shieldT=360; showMsg('◈ 护盾激活！',60);}
  else if(t==='bomb'){pl.bombs=Math.min(pl.bombs+1,5); showMsg('◉ 炸弹 +1！',60);}
}

// ── 消息 ─────────────────────────────────────────────────────
function showMsg(text,t){msg={text,t,maxT:t};}

// ── HUD ──────────────────────────────────────────────────────
function drawHUD(){
  cx.save();
  // 分数
  cx.fillStyle='#ffd700'; cx.font='bold 18px monospace'; cx.textAlign='left';
  cx.shadowColor='#ff8800'; cx.shadowBlur=8;
  cx.fillText(score,10,28); cx.shadowBlur=0;
  cx.fillStyle='#445'; cx.font='11px monospace'; cx.fillText('最高 '+hi,10,46);

  // 生命
  cx.textAlign='center'; cx.font='17px monospace';
  for(let i=0;i<pl.maxHp;i++){
    cx.fillStyle=i<pl.hp?'#ff2244':'#2a1a1a';
    cx.shadowColor=i<pl.hp?'#ff0022':'transparent'; cx.shadowBlur=6;
    cx.fillText('♥',20+i*22,H-12);
  }
  cx.shadowBlur=0;

  // 波次
  cx.fillStyle='#88aaff'; cx.font='bold 14px monospace'; cx.textAlign='right';
  cx.fillText('第 '+wave+' 波',W-10,28);

  // 炸弹
  cx.fillStyle='#ff8800'; cx.font='12px monospace';
  cx.fillText('炸弹 '+'◉'.repeat(pl.bombs),W-10,46);

  // 增益倒计时
  let py=H-30;
  if(pl.spreadT>0){cx.fillStyle='#00ffaa'; cx.font='11px monospace'; cx.fillText('≋ '+Math.ceil(pl.spreadT/60)+'s',W-10,py); py-=16;}
  if(pl.rapidT>0) {cx.fillStyle='#ffff00'; cx.font='11px monospace'; cx.fillText('⚡ '+Math.ceil(pl.rapidT/60)+'s',W-10,py); py-=16;}
  if(pl.shieldT>0){cx.fillStyle='#44aaff'; cx.font='11px monospace'; cx.fillText('◈ '+Math.ceil(pl.shieldT/60)+'s',W-10,py);}

  // 连击
  if(combo>=3 && comboT>0){
    cx.save(); cx.globalAlpha=Math.min(1,comboT/30);
    cx.fillStyle='#ffff00'; cx.shadowColor='#ff8800'; cx.shadowBlur=12;
    cx.font=`bold ${16+Math.min(combo,12)}px monospace`; cx.textAlign='center';
    cx.fillText(combo+'x COMBO!',W/2,H/2-70); cx.restore();
  }
  // 提示消息
  if(msg && msg.t>0){
    cx.save(); cx.globalAlpha=Math.min(1,msg.t/20);
    cx.fillStyle='#fff'; cx.shadowColor='#4488ff'; cx.shadowBlur=16;
    cx.font='bold 20px monospace'; cx.textAlign='center'; cx.textBaseline='middle';
    cx.fillText(msg.text,W/2,H/2-24); cx.restore();
  }
  cx.restore();
}

// ── 更新 ─────────────────────────────────────────────────────
function update(){
  frame++;

  // 玩家移动
  if(K['ArrowLeft']||K['KeyA']) pl.x-=pl.spd;
  if(K['ArrowRight']||K['KeyD']) pl.x+=pl.spd;
  if(K['ArrowUp']||K['KeyW'])   pl.y-=pl.spd;
  if(K['ArrowDown']||K['KeyS']) pl.y+=pl.spd;
  pl.x=cl(pl.x,pl.r,W-pl.r); pl.y=cl(pl.y,pl.r,H-pl.r);
  if(K['Space']) doBomb();

  // 计时器递减
  if(pl.invT>0)pl.invT--;
  if(pl.bombCD>0)pl.bombCD--;
  if(pl.spreadT>0)pl.spreadT--;
  if(pl.rapidT>0)pl.rapidT--;
  if(pl.shieldT>0)pl.shieldT--;
  if(msg&&msg.t>0)msg.t--;
  if(comboT>0)comboT--; else combo=0;

  // 自动射击
  shoot();

  // 波次生成
  if(spawnIdx<spawnQueue.length){
    const next=spawnQueue[spawnIdx];
    if(frame>=next.atF){ foes.push(mkFoe(next.type,next.x,next.y)); spawnIdx++; }
  } else if(foes.filter(e=>!e.dead).length===0){
    if(!betweenPhase){ betweenPhase=true; betweenTimer=160; }
    if(betweenTimer>0){ betweenTimer--; }
    else {
      betweenPhase=false; wave++; frame=0; spawnIdx=0;
      spawnQueue=buildWave(wave);
      score+=wave*60;
      const isBoss=wave%5===0;
      showMsg(isBoss?'⚠ BOSS 来袭！':'第 '+wave+' 波',90);
    }
  }

  // 移动子弹
  for(const b of buls){b.x+=b.vx; b.y+=b.vy; if(b.y<-20)b.dead=true;}
  for(const b of eBuls){b.x+=b.vx; b.y+=b.vy; if(b.y>H+20||b.y<-20||b.x<-20||b.x>W+20)b.dead=true;}

  // 更新敌机
  for(const e of foes){ if(!e.dead)updateFoe(e); if(e.y>H+80)e.dead=true; }

  // 更新粒子
  for(const p of pts){ p.x+=p.vx; p.y+=p.vy; p.vx*=0.94; p.vy*=0.94; p.life--; if(p.life<=0)p.dead=true; }

  // 更新道具
  for(const p of pups){ p.y+=p.vy; p.t++; if(p.y>H+30)p.dead=true; }

  // 碰撞
  collide();

  // 清除死亡对象
  buls=buls.filter(b=>!b.dead);
  eBuls=eBuls.filter(b=>!b.dead);
  foes=foes.filter(e=>!e.dead);
  pts=pts.filter(p=>!p.dead);
  pups=pups.filter(p=>!p.dead);
}

// ── 开始 & 重置 ───────────────────────────────────────────────
function startGame(){
  score=0; wave=0; combo=0; comboT=0; frame=0;
  pl=mkPl(); buls=[]; eBuls=[]; foes=[]; pts=[]; pups=[];
  spawnQ=[]; spawnIdx=0; spawnQueue=[];
  betweenPhase=true; betweenTimer=80;
  showMsg('准备！',90);
  phase='play';
}

// ── 覆盖层 ───────────────────────────────────────────────────
function drawStart(){
  drawBg();
  cx.fillStyle='rgba(2,8,24,0.6)'; cx.fillRect(0,0,W,H);
  cx.save(); cx.textAlign='center';
  cx.shadowColor='#ff4400'; cx.shadowBlur=24;
  cx.fillStyle='#ffd700'; cx.font='bold 34px monospace';
  cx.textBaseline='middle'; cx.fillText('决战海空',W/2,H/2-90);
  cx.shadowBlur=0;
  cx.fillStyle='#7a9acc'; cx.font='13px monospace'; cx.textBaseline='top';
  const lines=['← → ↑ ↓ / WASD  移动飞机','自动开火  ·  空格 发射炸弹','击落敌机获得道具 ★ 每5波出现BOSS'];
  lines.forEach((l,i)=>cx.fillText(l,W/2,H/2-28+i*22));
  if(Math.floor(Date.now()/500)%2){
    cx.fillStyle='#ffd700'; cx.font='bold 16px monospace';
    cx.fillText('点击 / 任意键 开始',W/2,H/2+60);
  }
  if(hi>0){cx.fillStyle='#446'; cx.font='12px monospace'; cx.fillText('历史最高: '+hi,W/2,H/2+96);}
  cx.restore();
}

function drawOver(){
  cx.fillStyle='rgba(0,0,0,0.72)'; cx.fillRect(0,0,W,H);
  cx.save(); cx.textAlign='center'; cx.textBaseline='middle';
  cx.shadowColor='#ff0000'; cx.shadowBlur=20;
  cx.fillStyle='#ff4444'; cx.font='bold 28px monospace'; cx.fillText('GAME OVER',W/2,H/2-55);
  cx.shadowBlur=0;
  cx.fillStyle='#ffd700'; cx.font='bold 22px monospace'; cx.fillText('得分: '+score,W/2,H/2);
  cx.fillStyle='#556'; cx.font='13px monospace'; cx.fillText('历史最高: '+hi,W/2,H/2+32);
  cx.fillStyle='#7a9acc'; cx.fillText('第 '+wave+' 波',W/2,H/2+54);
  if(Math.floor(Date.now()/500)%2){
    cx.fillStyle='#eee'; cx.font='14px monospace'; cx.fillText('点击 / 任意键 重试',W/2,H/2+90);
  }
  cx.restore();
}

// ── 主循环 ───────────────────────────────────────────────────
function loop(){
  if(phase==='start'){
    drawStart();
  } else if(phase==='play'){
    drawBg();
    drawPts();
    drawBuls();
    drawPups();
    for(const e of foes) if(!e.dead) drawFoe(e);
    drawPl();
    drawHUD();
    update();
  } else {
    drawBg();
    drawPts();
    for(const e of foes) if(!e.dead) drawFoe(e);
    for(const p of pts){p.x+=p.vx;p.y+=p.vy;p.vx*=0.94;p.vy*=0.94;p.life--;if(p.life<=0)p.dead=true;}
    pts=pts.filter(p=>!p.dead);
    drawOver();
  }
  requestAnimationFrame(loop);
}

const input=()=>{ if(phase==='start'||phase==='over') startGame(); };
window.addEventListener('keydown', input);
CV.addEventListener('click', input);

phase='start';
loop();
</script>
