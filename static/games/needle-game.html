<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>见缝插针</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #10152a;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px 0 10px;
    font-family: 'Courier New', monospace;
    user-select: none;
  }
  #game-title {
    font-size: 1.3rem;
    font-weight: bold;
    color: #ffd700;
    letter-spacing: 8px;
    margin-bottom: 8px;
    text-shadow: 0 0 14px rgba(255,215,0,0.45);
  }
  canvas { display: block; border-radius: 14px; }
  #hint { margin-top: 8px; font-size: 0.68rem; color: #38405a; }
</style>
</head>
<body>
<div id="game-title">见缝插针</div>
<canvas id="c" width="380" height="590"></canvas>
<div id="hint">单击 / 空格键 发射 · 不要碰到已有的针</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = C.width, H = C.height;

// ─── 常量 ─────────────────────────────────────────────
const BX = W / 2;       // 球心 x
const BY = 185;          // 球心 y
const BR = 68;           // 球半径
const NL = 60;           // 针伸出球外长度
const NW = 2.5;          // 针线宽
const TR = 5.5;          // 针尖圆半径
const SPEED = 9;         // 飞行针速度 px/帧
const CDIST = 10;        // 碰撞判定距离

// ─── 状态 ─────────────────────────────────────────────
let phase = 'idle';      // idle | play | over
let ballAngle = 0;       // 球当前旋转角
let ballSpeed = 0.022;   // 旋转速度 rad/帧
let ballDir = 1;         // 旋转方向 +1 顺 / -1 逆
let needles = [];        // [{local}] 球上的针（local=球坐标系角度）
let shot = null;         // 飞行中的针 {y: 针尖y坐标}
let score = 0;
let best = +(localStorage.getItem('jfcz') || 0);
let redFlash = 0;        // 碰撞红闪帧数

// ─── 工具函数 ─────────────────────────────────────────
function ptSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const l2 = dx * dx + dy * dy;
  if (l2 < 1e-9) return Math.hypot(px - ax, py - ay);
  const t = Math.max(0, Math.min(1, ((px-ax)*dx + (py-ay)*dy) / l2));
  return Math.hypot(px - ax - t*dx, py - ay - t*dy);
}

// 将 needle（球坐标系）转换为世界坐标的线段
function seg(n) {
  const a = n.local + ballAngle;
  const co = Math.cos(a), si = Math.sin(a);
  return {
    ax: BX + BR * co,          ay: BY + BR * si,
    bx: BX + (BR + NL) * co,  by: BY + (BR + NL) * si,
  };
}

// ─── 游戏逻辑 ─────────────────────────────────────────
function startGame() {
  ballAngle = Math.random() * Math.PI * 2;
  ballSpeed = 0.022;
  ballDir = 1;
  needles = [];
  shot = null;
  score = 0;
  redFlash = 0;
  phase = 'play';
}

function fire() {
  if (phase !== 'play' || shot) return;
  shot = { y: H - 75 };
}

function update() {
  if (phase !== 'play') return;

  ballAngle += ballSpeed * ballDir;

  if (!shot) return;
  shot.y -= SPEED;

  const tx = W / 2, ty = shot.y;

  // 检测与球上各针的碰撞
  for (const n of needles) {
    const s = seg(n);
    if (ptSegDist(tx, ty, s.ax, s.ay, s.bx, s.by) < CDIST) {
      phase = 'over';
      redFlash = 28;
      if (score > best) { best = score; localStorage.setItem('jfcz', best); }
      shot = null;
      return;
    }
  }

  // 针尖到达球面 → 插针
  if (Math.hypot(tx - BX, ty - BY) <= BR + 1) {
    const absA = Math.atan2(ty - BY, tx - BX);
    needles.push({ local: absA - ballAngle });
    score++;
    ballSpeed = Math.min(0.065, 0.022 + needles.length * 0.0014);
    if (score % 7 === 0) ballDir *= -1;   // 每7针换方向
    shot = null;
    return;
  }

  // 飞出屏幕上方（理论上不会触发，但做保险）
  if (ty < BY - BR - NL - 15) shot = null;
}

// ─── 绘图 ──────────────────────────────────────────────
function drawNeedle(x1, y1, x2, y2, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha ?? 1;
  const g = ctx.createLinearGradient(x1, y1, x2, y2);
  g.addColorStop(0, '#b8860b');
  g.addColorStop(1, '#ffd700');
  ctx.strokeStyle = g;
  ctx.lineWidth = NW;
  ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  ctx.fillStyle = '#ffe033';
  ctx.shadowColor = 'rgba(255,215,0,0.6)';
  ctx.shadowBlur = 4;
  ctx.beginPath(); ctx.arc(x2, y2, TR, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

function drawLauncher() {
  const lx = W / 2, ly = H - 52;
  // 底座
  ctx.fillStyle = '#1a2440';
  ctx.strokeStyle = '#2c3f6e';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(lx - 26, ly, 52, 30, 10); ctx.fill(); ctx.stroke();
  // 炮管
  ctx.fillStyle = '#141e38';
  ctx.beginPath(); ctx.roundRect(lx - 8, ly - 30, 16, 34, 5); ctx.fill(); ctx.stroke();
  // 待发的针（预览）
  if (!shot && phase === 'play') {
    drawNeedle(lx, ly - 30, lx, ly - 30 - NL * 0.42, 0.3);
  }
}

function render() {
  // 背景（碰撞时泛红）
  if (redFlash > 0) {
    const t = redFlash / 28;
    ctx.fillStyle = `rgb(${Math.round(16 + t * 90)}, ${Math.round(21 - t * 8)}, ${Math.round(42 - t * 12)})`;
    redFlash--;
  } else {
    ctx.fillStyle = '#10152a';
  }
  ctx.fillRect(0, 0, W, H);

  // 球
  ctx.save();
  ctx.shadowColor = 'rgba(200,215,255,0.25)';
  ctx.shadowBlur = 18;
  const grad = ctx.createRadialGradient(BX - 20, BY - 20, 6, BX, BY, BR);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.55, '#dce2f5');
  grad.addColorStop(1, '#a8b0cc');
  ctx.beginPath(); ctx.arc(BX, BY, BR, 0, Math.PI * 2);
  ctx.fillStyle = grad; ctx.fill();
  ctx.restore();

  // 球上的针
  for (const n of needles) {
    const s = seg(n);
    drawNeedle(s.ax, s.ay, s.bx, s.by);
  }

  // 飞行中的针
  if (shot) drawNeedle(W/2, shot.y + NL, W/2, shot.y);

  // 发射器
  drawLauncher();

  // 旋转方向指示
  if (phase === 'play') {
    ctx.save();
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = '#ffd700';
    ctx.font = '20px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ballDir > 0 ? '↻' : '↺', BX, BY + BR + 22);
    ctx.restore();
  }

  // 分数
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 44px monospace';
  ctx.fillText(score, W / 2, 12);
  ctx.fillStyle = '#2e3a5a';
  ctx.font = '12px monospace';
  ctx.fillText('最高 ' + best, W / 2, 62);

  // ── 覆盖层 ──
  if (phase === 'idle') {
    ctx.fillStyle = 'rgba(8,10,22,0.78)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 28px monospace';
    ctx.textBaseline = 'middle';
    ctx.fillText('见缝插针', W/2, H/2 - 30);
    ctx.fillStyle = '#8899bb';
    ctx.font = '14px monospace';
    ctx.fillText('点击 / 空格 开始', W/2, H/2 + 14);
    if (best > 0) {
      ctx.fillStyle = '#4a5070';
      ctx.font = '12px monospace';
      ctx.fillText('历史最高 ' + best + ' 针', W/2, H/2 + 42);
    }
  }

  if (phase === 'over') {
    ctx.fillStyle = 'rgba(8,10,22,0.82)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 24px monospace';
    ctx.textBaseline = 'middle';
    ctx.fillText('碰到啦！游戏结束', W/2, H/2 - 52);
    ctx.fillStyle = '#ffd700';
    ctx.font = `bold 58px monospace`;
    ctx.fillText(score, W/2, H/2 + 8);
    ctx.fillStyle = '#556688';
    ctx.font = '12px monospace';
    ctx.fillText('历史最高 ' + best + ' 针', W/2, H/2 + 55);
    ctx.fillStyle = '#8899bb';
    ctx.font = '14px monospace';
    ctx.fillText('点击 / 空格 重新开始', W/2, H/2 + 84);
  }
}

// ─── 输入 ──────────────────────────────────────────────
function onInput() {
  if (phase === 'idle' || phase === 'over') { startGame(); return; }
  fire();
}
document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); onInput(); } });
C.addEventListener('click', onInput);

// ─── 主循环 ────────────────────────────────────────────
function loop() { update(); render(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
