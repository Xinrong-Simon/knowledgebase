<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=500,initial-scale=1">
<title>XR围棋</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:#1a1a2e;color:#eee;
  font-family:'Segoe UI',Arial,sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:14px 0 12px;user-select:none;-webkit-user-select:none;
}
h1{
  font-size:1.32rem;font-weight:700;color:#f0c060;
  letter-spacing:5px;margin-bottom:10px;
}
#info{
  display:flex;align-items:center;gap:16px;font-size:.82rem;
  background:rgba(255,255,255,.07);padding:5px 16px;
  border-radius:20px;margin-bottom:8px;height:32px;
}
.dot{
  display:inline-block;width:13px;height:13px;border-radius:50%;
  border:1.5px solid #888;vertical-align:middle;margin-right:3px;flex-shrink:0;
}
.dot.b{background:#111}.dot.w{background:#eee}
#canvas-wrap{position:relative;cursor:crosshair}
canvas{display:block}
#btns,#szrow{display:flex;gap:8px;margin-top:10px}
button{
  background:rgba(255,255,255,.1);color:#ddd;
  border:1px solid rgba(255,255,255,.22);padding:6px 15px;
  border-radius:20px;font-size:.8rem;cursor:pointer;
  transition:background .15s;font-family:inherit;
}
button:hover{background:rgba(255,255,255,.2)}
.primary{background:#f0c060;color:#111;border-color:#f0c060;font-weight:700}
.primary:hover{background:#ffd070}
.sz{padding:4px 12px;font-size:.75rem}
.sz.on{background:rgba(240,192,96,.25);border-color:#f0c060;color:#f0c060}
#overlay{
  display:none;position:absolute;inset:0;
  background:rgba(8,8,20,.9);border-radius:4px;
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;text-align:center;padding:24px;
}
#overlay.show{display:flex}
#overlay h2{font-size:1.2rem;color:#f0c060}
#overlay .sc{font-size:.86rem;line-height:2.1;color:#ccc}
#overlay .win{font-size:1.05rem;font-weight:700;margin-top:2px}
#tip{
  font-size:.72rem;color:#888;margin-top:6px;
}
</style>
</head>
<body>
<h1>⚫ XR围棋 ⚪</h1>

<div id="info">
  <span id="turn"><span class="dot b"></span>黑棋落子</span>
  <span>黑提&nbsp;<b id="cb">0</b></span>
  <span>白提&nbsp;<b id="cw">0</b></span>
</div>

<div id="canvas-wrap">
  <canvas id="cv"></canvas>
  <div id="overlay">
    <h2>对局结束</h2>
    <div class="sc" id="sc"></div>
    <div class="win" id="win"></div>
    <button class="primary" style="margin-top:10px" onclick="newGame(currentN)">再来一局</button>
  </div>
</div>

<div id="btns">
  <button onclick="doPass()">虚手 Pass</button>
  <button onclick="doUndo()">悔棋 Undo</button>
  <button onclick="doResign()">认负 Resign</button>
  <button class="primary" onclick="newGame(currentN)">新局</button>
</div>
<div id="szrow">
  <button class="sz" id="b9" onclick="newGame(9)">9×9</button>
  <button class="sz" id="b13" onclick="newGame(13)">13×13</button>
  <button class="sz on" id="b19" onclick="newGame(19)">19×19</button>
</div>
<div id="tip">双方连续虚手后自动计算领地 · 贴目 6.5</div>

<script>
'use strict';
const EMPTY=0,BLACK=1,WHITE=2,KOMI=6.5;
const COLS='ABCDEFGHJKLMNOPQRST';

let N,board,prevBS,cur,capB,capW,lastXY,passN,over,hist,cachedTerr;
let currentN=19;
let CELL,MAR,SR,CS;

const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');

/* ─── Game initialisation ─── */
function newGame(n){
  currentN=N=n;
  board=Array.from({length:N},()=>new Array(N).fill(EMPTY));
  prevBS=null;cur=BLACK;capB=capW=0;lastXY=null;passN=0;over=false;hist=[];cachedTerr=null;
  CS=500; MAR=Math.round(CS/(N+1.5)); CELL=(CS-2*MAR)/(N-1); SR=CELL*0.46;
  cv.width=cv.height=CS;
  document.getElementById('overlay').classList.remove('show');
  ['9','13','19'].forEach(s=>document.getElementById('b'+s).className='sz'+(n===+s?' on':''));
  draw();ui();
}

/* ─── Board utilities ─── */
function nbrs(x,y){
  const r=[];
  if(x>0)r.push([x-1,y]);if(x<N-1)r.push([x+1,y]);
  if(y>0)r.push([x,y-1]);if(y<N-1)r.push([x,y+1]);
  return r;
}

function getGroup(brd,x,y){
  const c=brd[y][x];
  if(c===EMPTY)return{stones:[],libs:0};
  const st=[],lib=new Set(),vis=new Set(),q=[[x,y]];
  while(q.length){
    const[cx,cy]=q.shift(),k=cx+','+cy;
    if(vis.has(k))continue;vis.add(k);
    if(brd[cy][cx]!==c)continue;
    st.push([cx,cy]);
    for(const[nx,ny]of nbrs(cx,cy)){
      if(brd[ny][nx]===EMPTY)lib.add(nx+','+ny);
      else if(brd[ny][nx]===c)q.push([nx,ny]);
    }
  }
  return{stones:st,libs:lib.size};
}

const bstr=brd=>brd.map(r=>r.join('')).join('|');
const clone=brd=>brd.map(r=>[...r]);

/* ─── Place a stone ─── */
function place(x,y){
  if(over||board[y][x]!==EMPTY)return false;
  const opp=cur===BLACK?WHITE:BLACK;
  const sb=clone(board),sp=prevBS;
  board[y][x]=cur;
  let cap=0;
  for(const[nx,ny]of nbrs(x,y)){
    if(board[ny][nx]===opp){
      const{stones,libs}=getGroup(board,nx,ny);
      if(libs===0){for(const[sx,sy]of stones){board[sy][sx]=EMPTY;cap++;}}
    }
  }
  if(getGroup(board,x,y).libs===0){board=sb;return false;} // suicide
  const ns=bstr(board);
  if(ns===prevBS){board=sb;return false;} // Ko
  hist.push({board:sb,prevBS:sp,capB,capW,lastXY,passN});
  if(cur===BLACK)capB+=cap;else capW+=cap;
  prevBS=bstr(sb);lastXY=[x,y];passN=0;cur=opp;
  return true;
}

/* ─── Actions ─── */
function doPass(){
  if(over)return;
  hist.push({board:clone(board),prevBS,capB,capW,lastXY,passN});
  passN++;prevBS=null;lastXY=null;
  if(passN>=2){endGame();return;}
  cur=cur===BLACK?WHITE:BLACK;draw();ui();
}

function doUndo(){
  if(over||!hist.length)return;
  const h=hist.pop();
  board=h.board;prevBS=h.prevBS;capB=h.capB;capW=h.capW;
  lastXY=h.lastXY;passN=h.passN;
  cur=cur===BLACK?WHITE:BLACK;
  over=false;cachedTerr=null;
  document.getElementById('overlay').classList.remove('show');
  draw();ui();
}

function doResign(){
  if(over)return;
  over=true;
  const loser=cur===BLACK?'⚫ 黑棋':'⚪ 白棋';
  const winner=cur===BLACK?'⚪ 白棋胜（黑棋认负）':'⚫ 黑棋胜（白棋认负）';
  document.getElementById('sc').innerHTML=`${loser}认负`;
  const w=document.getElementById('win');
  w.textContent=winner;
  w.style.color=cur===BLACK?'#ffe':'#aef';
  document.getElementById('overlay').classList.add('show');
  draw();ui();
}

/* ─── Territory counting (Japanese rules) ─── */
function calcTerritory(){
  const vis=new Set();
  const terr=Array.from({length:N},()=>new Array(N).fill(EMPTY));
  let bT=0,wT=0;
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    if(board[y][x]===EMPTY&&!vis.has(x+','+y)){
      const reg=[],borders=new Set(),q=[[x,y]];
      while(q.length){
        const[qx,qy]=q.shift(),k=qx+','+qy;
        if(vis.has(k))continue;vis.add(k);
        if(board[qy][qx]!==EMPTY){borders.add(board[qy][qx]);continue;}
        reg.push([qx,qy]);
        for(const[nx,ny]of nbrs(qx,qy))if(!vis.has(nx+','+ny))q.push([nx,ny]);
      }
      if(borders.size===1){
        const o=[...borders][0];
        reg.forEach(([rx,ry])=>terr[ry][rx]=o);
        if(o===BLACK)bT+=reg.length;else wT+=reg.length;
      }
    }
  }
  return{bT,wT,terr};
}

function endGame(){
  over=true;
  cachedTerr=calcTerritory();
  const{bT,wT}=cachedTerr;
  const bs=bT+capB,ws=wT+capW+KOMI;
  draw();
  document.getElementById('sc').innerHTML=
    `⚫ 黑棋：${bT} 目 + ${capB} 提子 = <b>${bs}</b> 分<br>`+
    `⚪ 白棋：${wT} 目 + ${capW} 提子 + ${KOMI} 贴目 = <b>${ws}</b> 分`;
  const w=document.getElementById('win');
  if(bs>ws){w.textContent=`⚫ 黑棋胜 +${(bs-ws).toFixed(1)}`;w.style.color='#aef';}
  else{w.textContent=`⚪ 白棋胜 +${(ws-bs).toFixed(1)}`;w.style.color='#ffe';}
  document.getElementById('overlay').classList.add('show');
}

/* ─── Drawing ─── */
const gx=x=>MAR+x*CELL;
const gy=y=>MAR+y*CELL;

function starPoints(){
  if(N===19)return[[3,3],[3,9],[3,15],[9,3],[9,9],[9,15],[15,3],[15,9],[15,15]];
  if(N===13)return[[3,3],[3,9],[9,3],[9,9],[6,6]];
  if(N===9) return[[2,2],[2,6],[6,2],[6,6],[4,4]];
  return[];
}

function draw(){
  // Board background
  const bg=ctx.createLinearGradient(0,0,CS,CS);
  bg.addColorStop(0,'#d4a530');bg.addColorStop(1,'#b8880c');
  ctx.fillStyle=bg;ctx.fillRect(0,0,CS,CS);

  // Subtle wood grain
  ctx.save();ctx.globalAlpha=.045;ctx.strokeStyle='#000';ctx.lineWidth=1;
  for(let i=0;i<CS;i+=7){
    ctx.beginPath();
    ctx.moveTo(0,i+Math.sin(i/55)*2.5);
    ctx.lineTo(CS,i+Math.cos(i/48)*2.5);
    ctx.stroke();
  }
  ctx.restore();

  // Grid lines
  ctx.strokeStyle='#3a2800';ctx.lineWidth=0.75;
  for(let i=0;i<N;i++){
    ctx.beginPath();ctx.moveTo(gx(i),gy(0));ctx.lineTo(gx(i),gy(N-1));ctx.stroke();
    ctx.beginPath();ctx.moveTo(gx(0),gy(i));ctx.lineTo(gx(N-1),gy(i));ctx.stroke();
  }
  ctx.strokeStyle='#2a1800';ctx.lineWidth=1.8;
  ctx.strokeRect(gx(0),gy(0),gx(N-1)-gx(0),gy(N-1)-gy(0));

  // Star points (hoshi)
  ctx.fillStyle='#3a2800';
  for(const[sx,sy]of starPoints()){
    ctx.beginPath();ctx.arc(gx(sx),gy(sy),Math.max(2.5,CELL*.1),0,Math.PI*2);ctx.fill();
  }

  // Coordinate labels
  const fs=Math.max(8,Math.min(13,MAR*.52));
  ctx.fillStyle='#6a4010';ctx.font=`${fs}px monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<N;i++){
    ctx.fillText(COLS[i],gx(i),MAR/2);
    ctx.fillText(COLS[i],gx(i),CS-MAR/2);
    ctx.fillText(N-i,MAR/2,gy(i));
    ctx.fillText(N-i,CS-MAR/2,gy(i));
  }

  // Territory marks (game over)
  if(over&&cachedTerr){
    const{terr}=cachedTerr;
    for(let y=0;y<N;y++)for(let x=0;x<N;x++){
      if(terr[y][x]!==EMPTY){
        const s=CELL*.27;
        ctx.fillStyle=terr[y][x]===BLACK?'rgba(0,0,0,.5)':'rgba(255,255,255,.6)';
        ctx.fillRect(gx(x)-s,gy(y)-s,s*2,s*2);
      }
    }
  }

  // Stones
  for(let y=0;y<N;y++)for(let x=0;x<N;x++){
    if(board[y][x]!==EMPTY)drawStone(x,y,board[y][x]);
  }

  // Last-move marker
  if(lastXY){
    const[lx,ly]=lastXY;
    ctx.beginPath();ctx.arc(gx(lx),gy(ly),SR*.3,0,Math.PI*2);
    ctx.fillStyle=board[ly][lx]===BLACK?'rgba(255,255,255,.88)':'rgba(0,0,0,.78)';
    ctx.fill();
  }
}

function drawStone(x,y,c){
  const px=gx(x),py=gy(y),r=SR;
  ctx.beginPath();ctx.arc(px+r*.09,py+r*.14,r,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.fill();
  const gr=ctx.createRadialGradient(px-r*.3,py-r*.36,r*.06,px,py,r);
  if(c===BLACK){
    gr.addColorStop(0,'#666');gr.addColorStop(.4,'#1c1c1c');gr.addColorStop(1,'#000');
  }else{
    gr.addColorStop(0,'#fff');gr.addColorStop(.5,'#e6e6e6');gr.addColorStop(1,'#bbb');
  }
  ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
}

function ui(){
  const t=document.getElementById('turn');
  if(!over){
    const isB=cur===BLACK;
    t.innerHTML=`<span class="dot ${isB?'b':'w'}"></span>${isB?'黑棋落子':'白棋落子'}`;
  }else{t.innerHTML='对局结束';}
  document.getElementById('cb').textContent=capB;
  document.getElementById('cw').textContent=capW;
}

/* ─── Input ─── */
let hover=null;

function pointerToCell(e){
  const r=cv.getBoundingClientRect();
  const sx=cv.width/r.width,sy=cv.height/r.height;
  let px,py;
  if(e.touches){
    px=(e.touches[0].clientX-r.left)*sx;
    py=(e.touches[0].clientY-r.top)*sy;
  }else{
    px=(e.clientX-r.left)*sx;
    py=(e.clientY-r.top)*sy;
  }
  const x=Math.round((px-MAR)/CELL),y=Math.round((py-MAR)/CELL);
  const dx=px-(MAR+x*CELL),dy=py-(MAR+y*CELL);
  if(x<0||x>=N||y<0||y>=N||Math.sqrt(dx*dx+dy*dy)>CELL*.55)return null;
  return[x,y];
}

cv.addEventListener('click',e=>{
  if(over)return;
  const p=pointerToCell(e);
  if(!p)return;
  if(place(p[0],p[1])){hover=null;draw();ui();}
});

cv.addEventListener('touchend',e=>{
  if(over)return;
  e.preventDefault();
  const p=pointerToCell(e.changedTouches?{clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY}:e);
  if(!p)return;
  if(place(p[0],p[1])){hover=null;draw();ui();}
},{passive:false});

cv.addEventListener('mousemove',e=>{
  if(over)return;
  const p=pointerToCell(e);
  const np=p&&board[p[1]][p[0]]===EMPTY?p:null;
  if(JSON.stringify(np)!==JSON.stringify(hover)){
    hover=np;draw();
    if(hover){
      ctx.beginPath();ctx.arc(gx(hover[0]),gy(hover[1]),SR,0,Math.PI*2);
      ctx.fillStyle=cur===BLACK?'rgba(0,0,0,.35)':'rgba(255,255,255,.45)';
      ctx.fill();
    }
  }
});

cv.addEventListener('mouseleave',()=>{if(hover){hover=null;draw();}});

document.addEventListener('keydown',e=>{
  if(e.key==='p'||e.key==='P')doPass();
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();doUndo();}
});

newGame(19);
</script>
</body>
</html>
